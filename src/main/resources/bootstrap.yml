server:
    port: 0 
    forward-headers-strategy: framework 
spring:
  application.name: configuration
  docker.compose:
      enabled: true
      file: docker-compose.yml
  profiles.active: git    
  main.allow-bean-definition-overriding: true
  cloud:
    config:
       server:    
         git:
           uri: '{cipher}' 
           username: '{cipher}'  
           password: '{cipher}' 
           default-label: '{cipher}' 
           clone-on-start: true
           force-pull: true
           skipSslValidation: true
           timeout: 10
    consul:
       config.enabled: false
       host: besteam-consul-server-leader      
       port: 8500
       discovery:
         prefer-ip-address: true
         enabled: true    
         instance-id: ${spring.application.name}:${random.int[1,99]}
         register-health-check: false
  security:
    user:
      name: '{cipher}' 
      password: '{cipher}'  
#With the Java keytool command, we generate a new keystore including a RSA key-pair to be stored under src/main/resources
#keytool -genkeypair -alias config-server-key -keyalg RSA -dname "cn=Config-Serv, ou=IT, o=Blacksea Technology SARL, L=Dubai, S=UAE, c=AE" -keystore config-server.jks
#Then migrating to the industry standard format PKCS12 with the following command
#keytool -importkeystore -srckeystore config-server.jks -destkeystore config-server.jks -deststoretype pkcs12
encrypt.keyStore:
    location: ${encrypt_keystore_location} 
    password: ${encrypt_keystore_pwd}  
    alias: ${encrypt_keystore_alias} 
management.endpoints.web.exposure.include: "*"
logging:level.org.springframework.cloud.consul: DEBUG
#Swagger-UI documentation
springdoc:
    api-docs.path: /configuration-docs
    swagger-ui.path: /configuration-doc.html    